# Local / VPS development overrides — bind-mount code for fast iteration.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
services:
  bot:
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./seed:/app/seed
      - ./tests:/app/tests
      - ./alembic.ini:/app/alembic.ini
      - ./pytest.ini:/app/pytest.ini

  worker:
    volumes:
      - ./app:/app/app
      - ./sessions:/app/sessions

  admin:
    volumes:
      - ./app:/app/app
