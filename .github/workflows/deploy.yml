name: Deploy

# Runs only after CI succeeds on main (or manual dispatch).
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:
    inputs:
      deploy_sha:
        description: "40-character commit SHA already verified by CI"
        required: true
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 40
    # Manual approval: Settings → Environments → production → Required reviewers
    environment: production
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )

    steps:
      - name: Select CI-verified immutable SHA
        id: target
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        with:
          script: |
            const sha = context.eventName === "workflow_run"
              ? context.payload.workflow_run.head_sha
              : context.payload.inputs.deploy_sha;
            if (!/^[0-9a-f]{40}$/i.test(sha || "")) {
              core.setFailed("deploy_sha must be a non-empty 40-character hexadecimal SHA");
              return;
            }

            // workflow_run already gates on the triggering CI conclusion — trust it.
            // Re-querying listWorkflowRuns(head_sha) races and falsely fails deploys.
            if (context.eventName === "workflow_run") {
              const trigger = context.payload.workflow_run;
              if (trigger.conclusion !== "success") {
                core.setFailed(`Triggering CI conclusion is ${trigger.conclusion}`);
                return;
              }
              core.setOutput("sha", sha);
              return;
            }

            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "ci.yml",
              head_sha: sha,
              status: "completed",
              per_page: 20,
            });
            if (!runs.data.workflow_runs.some(run => run.conclusion === "success")) {
              core.setFailed(`No successful CI run found for ${sha}`);
              return;
            }
            core.setOutput("sha", sha);

      - name: Deploy over SSH
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17  # v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ vars.DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then
              DEPLOY_PATH="/opt/LeadHunter"
            fi
            cd "$DEPLOY_PATH"
            echo "[deploy] host=$(hostname) path=$DEPLOY_PATH"
            DEPLOY_SHA="${{ steps.target.outputs.sha }}"
            if ! [[ "$DEPLOY_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
              echo "Invalid deploy SHA"; exit 1
            fi
            git fetch origin "$DEPLOY_SHA"
            git checkout --detach "$DEPLOY_SHA"
            [ "$(git rev-parse HEAD)" = "$DEPLOY_SHA" ] || { echo "Detached SHA mismatch"; exit 1; }
            chmod +x scripts/deploy.sh
            DEPLOY_SHA="$DEPLOY_SHA" bash scripts/deploy.sh
            docker compose ps --all
            docker compose logs --tail=80 worker | tee /tmp/lh_worker_tail.txt
            if grep -Eiq 'FloodWait|CRITICAL' /tmp/lh_worker_tail.txt; then
              echo "FloodWait/CRITICAL in worker logs — failing deploy"
              exit 1
            fi
