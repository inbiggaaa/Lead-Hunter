name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Dummy secrets — Settings() loads at import time
  BOT_TOKEN: "000000000:CI_DUMMY_TOKEN_NOT_REAL"
  OWNER_TELEGRAM_ID: "1"
  USERBOT_API_ID: "1"
  USERBOT_API_HASH: "0123456789abcdef0123456789abcdef"
  USERBOT_PHONE: ""
  POSTGRES_HOST: localhost
  POSTGRES_PORT: "5432"
  POSTGRES_USER: lhtest
  POSTGRES_PASSWORD: lhtest
  POSTGRES_DB: lhtest
  REDIS_HOST: localhost
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  ADMIN_PASSWORD: ci_admin_password
  ADMIN_SECRET: "0123456789abcdef0123456789abcdef"
  LLM_ENABLED: "false"
  PYTHONPATH: ${{ github.workspace }}

jobs:
  pytest:
    name: Pytest
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
        env:
          POSTGRES_USER: lhtest
          POSTGRES_PASSWORD: lhtest
          POSTGRES_DB: lhtest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lhtest -d lhtest"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.txt

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest tests/ -v --tb=short

      - name: Dependency audit (HIGH/CRITICAL blocking)
        run: |
          set -euo pipefail
          pip install pip-audit
          ignore_args=()
          while IFS= read -r line || [ -n "$line" ]; do
            id="${line%%#*}"
            id="$(echo "$id" | tr -d '[:space:]')"
            [ -z "$id" ] && continue
            ignore_args+=(--ignore-vuln "$id")
          done < docs/security/pip_audit_allowlist.txt
          # Fail the job on any remaining reported vulnerability.
          # Justify ignores in docs/security/pip_audit_allowlist.txt only.
          pip-audit -r requirements.lock "${ignore_args[@]}"

  llm-blocking:
    name: LLM blocking mode
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      LLM_ENABLED: "true"
      LLM_MODE: "blocking"
      DEEPSEEK_API_KEY: "ci-fake-key-not-real"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.txt

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Blocking-mode unit gate (fake DeepSeek)
        run: pytest tests/test_llm_blocking_mode.py -v --tb=short

  alembic:
    name: Alembic
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
        env:
          POSTGRES_USER: lhtest
          POSTGRES_PASSWORD: lhtest
          POSTGRES_DB: lhtest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lhtest -d lhtest"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.lock

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.lock

      - name: Single Alembic head
        run: |
          heads=$(alembic heads | wc -l | tr -d ' ')
          if [ "$heads" != "1" ]; then
            echo "Expected exactly 1 Alembic head, got $heads:"
            alembic heads
            exit 1
          fi

      # Initial revision ca16bab1a0cc is empty (schema predated Alembic), so
      # upgrade-from-zero is not supported. Smoke-test head reversibility on a
      # model-created schema instead.
      - name: Head revision reversibility smoke
        run: |
          python - <<'PY'
          import asyncio
          from sqlalchemy.ext.asyncio import create_async_engine
          from app.config import settings
          from app.db.models import Base

          async def main() -> None:
              engine = create_async_engine(settings.database_url)
              async with engine.begin() as conn:
                  await conn.run_sync(Base.metadata.create_all)
              await engine.dispose()

          asyncio.run(main())
          PY
          alembic stamp head
          alembic downgrade -1
          alembic upgrade head

  admin:
    name: Admin panel
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: admin-panel/package-lock.json

      - name: Install, lint, build, audit
        working-directory: admin-panel
        run: |
          npm ci
          npm run lint
          npm run build
          npm audit --omit=dev || true

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Build image
        run: docker build -t lh-ci:test .

      - name: Non-root user check
        run: |
          uid="$(docker run --rm --entrypoint id lh-ci:test -u)"
          test "$uid" = "10001"

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Fail if tracked secrets / session files
        run: |
          set -euo pipefail
          bad=$(git ls-files | grep -E '(^|/)\.env$|\.session$|\.pem$|id_rsa$|id_ed25519$' || true)
          if [ -n "$bad" ]; then
            echo "Tracked secret or session files:"
            echo "$bad"
            exit 1
          fi

      - name: Scan PR/push diff for real-looking credential assignments
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            range="${base}...${head}"
          else
            if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
              range="HEAD^...HEAD"
            else
              range="HEAD"
            fi
          fi

          hits=$(git diff -U0 --unified=0 "$range" -- . \
            ':(exclude)*.md' ':(exclude)docs/**' \
            | grep -E '^\+' \
            | grep -vE '^\+\s*#' \
            | grep -E '(BOT_TOKEN|POSTGRES_PASSWORD|ADMIN_SECRET|ADMIN_PASSWORD|USERBOT_API_HASH|DEEPSEEK_API_KEY|CRYPTOBOT_API_TOKEN|SENTRY_DSN|SESSION_BACKUP_PASSPHRASE|REDIS_PASSWORD)=' \
            | grep -vE 'CI_DUMMY|lhtest|0123456789abcdef0123456789abcdef|ci_admin_password' \
            || true)

          if [ -n "$hits" ]; then
            echo "Possible secrets introduced in diff:"
            echo "$hits"
            exit 1
          fi
