services:
  db:
    image: postgres@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No host ports in the base file — use docker-compose.dev.yml for local binds.
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 400M

  redis:
    image: redis@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    # Optional REDIS_PASSWORD: set the same value in .env for redis + bot/worker/admin.
    # Empty password keeps the previous unauthenticated mode (dev / until cutover).
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes --appendfsync everysec --requirepass "$$REDIS_PASSWORD"
        else
          exec redis-server --appendonly yes --appendfsync everysec
        fi
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping; else redis-cli ping; fi",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 100M

  bot:
    build: .
    command: python -m app.main
    env_file: .env
    environment:
      - PYTHONPATH=/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python -m app.main' > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    user: "10001:10001"
    deploy:
      resources:
        limits:
          memory: 300M

  worker:
    build: .
    command: python -m app.worker.tasks
    env_file: .env
    environment:
      - PYTHONPATH=/app
    volumes:
      # Host ./sessions must be writable by UID 10001 (non-root container).
      - ./sessions:/app/sessions
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python -m app.worker.tasks' > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    user: "10001:10001"
    deploy:
      resources:
        limits:
          memory: 1G

  admin:
    build: .
    command: python -m app.admin.app
    env_file: .env
    environment:
      - PYTHONPATH=/app
    # Bind only on loopback by default (SSH tunnel / local). Override via ADMIN_BIND_HOST.
    ports:
      - "${ADMIN_BIND_HOST:-127.0.0.1}:${ADMIN_PUBLIC_PORT:-17421}:8001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f -s http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    user: "10001:10001"
    deploy:
      resources:
        limits:
          memory: 200M

volumes:
  postgres_data:
  redis_data:
